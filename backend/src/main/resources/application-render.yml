spring:
  application:
    name: backend
  datasource:
    url: jdbc:h2:mem:loandb
    username: backend
    password: backend
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.xml
    enabled: true

server:
  port: 8080